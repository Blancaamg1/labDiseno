<div class="pagina-pago">
  <div class="cabecera">
    VENTANA DE PAGO
  </div>

  <div class="contenedor-pago">
    <div class="pagos">
      <div class="resumen-pago">
        <p>Precio por entrada: <strong>{{ precioUnitario }} €</strong></p>
        <p>Cantidad de entradas: <strong>{{ cantidadEntradas }}</strong></p>
        <p>Total: <strong>{{ importe }} €</strong></p>
        <button class="btnPago" (click)="irAPago()">Ir al pago</button>
      </div>

      <form
        id="payment-form"
        [hidden]="!showPaymentForm"
        (submit)="onSubmitPayment($event)"
      >
        <div #cardElement id="card-element"></div>

        <button
          id="submit"
          type="submit"
          [disabled]="!isCardReady || isProcessing"
        >
          <span id="button-text">
            {{ isProcessing ? 'Procesando...' : 'Pay now' }}
          </span>
        </button>

        <p id="card-error" role="alert">{{ cardError }}</p>

        <p class="result-message" [hidden]="true">
          Payment succeeded, see the result in your
          <a href="" target="_blank">Stripe dashboard.</a>
          Refresh the page to pay again.
        </p>
      </form>
    </div>
  </div>
</div>
