<div class="cabecera">
  <h1>Iniciar sesión</h1>
</div>

<div class="login-container">
  <form (ngSubmit)="iniciarSesion()">
    <div class="form-row">
      <label for="name">Usuario</label>
      <input
        id="name"
        type="text"
        [(ngModel)]="name"
        name="name"
        autocomplete="username"
        required
      >
    </div>

    <div class="form-row">
      <label for="pwd">Contraseña</label>
      <div class="password-wrapper">
        <input
          id="pwd"
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="pwd"
          name="pwd"
          autocomplete="current-password"
          required
        >
        <button
          type="button"
          class="eye-btn"
          (click)="togglePassword()"
          [attr.aria-pressed]="mostrarPassword"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          {{ mostrarPassword ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>
    </div>

    <button class="submit-btn" type="submit" [disabled]="loading || !name || !pwd">
      {{ loading ? 'Cargando...' : 'Iniciar sesión' }}
    </button>

    <a class="recover-link" href="/recuperar-contrasena">He olvidado mi contrasena</a>

    <p *ngIf="error" class="error">{{ error }}</p>
  </form>
</div>
